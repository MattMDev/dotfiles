# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us,il
    kb_variant = ,
    kb_options = grp:ctrl_space_toggle
    numlock_by_default = true
    follow_mouse = 1
    sensitivity = 0
    repeat_rate = 35
    repeat_delay = 200
}

# https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}
